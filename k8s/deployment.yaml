
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finna-app-ui
  labels:
    app: finna-app-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finna-app-ui
  template:
    metadata:
      labels:
        app: finna-app-ui
    spec:
      containers:
      - name: finna-app-ui
        image: finna-app-ui:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
