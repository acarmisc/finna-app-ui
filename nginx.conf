server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # GKE healthz
    location /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to backend
    # Use resolver to allow dynamic DNS resolution (required on Alpine/musl)
    location /api/ {
        resolver 10.96.0.10 valid=10s ipv6=off;
        set $upstream finops-api.finna-app.svc.cluster.local;
        proxy_pass http://$upstream:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
